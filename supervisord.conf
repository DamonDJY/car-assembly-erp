[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:postgresql]
command=/usr/lib/postgresql/17/bin/postgres -D /var/lib/postgresql/17/main -c config_file=/etc/postgresql/17/main/postgresql.conf
user=postgres
autostart=true
autorestart=true
priority=1
startsecs=3
stdout_logfile=/var/log/supervisor/postgresql.log
stderr_logfile=/var/log/supervisor/postgresql.err

[program:dotnetapp]
command=/usr/bin/dotnet /app/publish/CarAssemblyErp.dll
user=root
directory=/app/publish
autostart=true
autorestart=true
priority=10
startsecs=5
startretries=10
environment=ASPNETCORE_URLS="http://0.0.0.0:5000"
stdout_logfile=/var/log/supervisor/dotnetapp.log
stderr_logfile=/var/log/supervisor/dotnetapp.err

[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
user=root
autostart=true
autorestart=true
priority=20
startsecs=1
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.err
