services:
  car-erp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "5432:5432"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - pgdata:/var/lib/postgresql/16/main
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
