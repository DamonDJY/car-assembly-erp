# ============================================================
# 本地开发环境 Docker Compose (Phase 02)
# 需要先用 docker-compose.infra.yml 启动 PostgreSQL 主从 + Redis
# 然后本文件启动 .NET 应用容器
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-erp-app
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Primary=Host=host.docker.internal;Port=5432;Database=CarAssemblyErp;Username=postgres;Password=postgres
      - ConnectionStrings__Replica1=Host=host.docker.internal;Port=5433;Database=CarAssemblyErp;Username=postgres;Password=postgres
      - ConnectionStrings__Replica2=Host=host.docker.internal;Port=5434;Database=CarAssemblyErp;Username=postgres;Password=postgres
      - Redis__ConnectionString=host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
