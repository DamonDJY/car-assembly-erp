# ============================================================
# 本地开发环境 Docker Compose
# 启动 PostgreSQL 17 容器，供本地 dotnet run 或 Docker 调试使用
# ============================================================

services:
  db:
    image: postgres:17
    container_name: car-erp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: CarAssemblyErp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可选：同时启动 .NET 应用容器（用于完整容器化调试）
  # 取消下面注释即可启用
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: car-erp-app
  #   ports:
  #     - "8080:80"
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=Development
  #     - ConnectionStrings__Default=Host=db;Database=CarAssemblyErp;Username=postgres;Password=postgres;Port=5432
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
